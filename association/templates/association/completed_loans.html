

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .loan-details {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .loan-details h2 {
            color: #333;
        }
        .loan-details p {
            margin: 10px 0;
            color: #555;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: center;
            color: #333;
        }
        th {
            background-color: #f2f2f2;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
<h1>Remboursements Complétés</h1>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Utilisateur</th>
            <th>Durée (mois)</th>
            <th>Total Remboursé (F CFA)</th>
        </tr>
    </thead>
    <tbody>
        {% for loan in completed_loans %}
        <tr>
            <td>{{ loan.user.first_name }}   {{ loan.user.last_name }}</td>
            <td>{{ loan.duree }}</td>
            <td>{{ loan.total_remboursement }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
