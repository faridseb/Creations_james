<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Comité</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Connexion Comité</h2>
        <form method="POST" action="{% url 'association:login_comite' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_comite">ID Comité</label>
                <input type="text" name="id_comite" id="id_comite" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password_comite">Mot de passe</label>
                <input type="password" name="password_comite" id="password_comite" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </form>
    </div>
</body>
</html>
