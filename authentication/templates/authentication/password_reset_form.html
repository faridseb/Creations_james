{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation du mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2 class="text-center mt-5">Réinitialisation du mot de passe</h2>
        <p class="text-center">Entrez votre nom d'utilisateur (pseudo ou username) pour recevoir un lien de réinitialisation.</p>
        <form method="post" action="{% url 'authentication:password_reset_form' %}">
    {% csrf_token %}
    <div class="form-group">
        <label for="username">Nom d'utilisateur :</label>
        <input type="text" name="username" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary mt-3 w-100">Envoyer le lien</button>
</form>

        {% if messages %}
            <div class="alert alert-danger">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    </div>
</body>
</html>
