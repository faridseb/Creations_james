<!-- payment_selection.html -->
{% extends 'use.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <title>Sélection de paiement</title>
    <style>
        body {
            background-color: #f8f9fa; /* Couleur de fond douce */
        }
        .container {
            margin-top: 50px; /* Espace en haut */
            max-width: 600px; /* Largeur maximale */
        }
        .card {
            padding: 20px; /* Espacement interne */
            border-radius: 10px; /* Coins arrondis */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Ombre légère */
            background-color: #ffffff; /* Couleur de fond de la carte */
        }
        .card h2 {
            color: #343a40; /* Couleur du texte du titre */
        }
        .form-label {
            color: #495057; /* Couleur du texte des labels */
            font-weight: bold; /* Met en gras le texte des labels */
        }
        .form-control {
            color: #495057; /* Couleur du texte dans les champs du formulaire */
            background-color: #ffffff; /* Couleur de fond des champs du formulaire */
            border: 1px solid #ced4da; /* Couleur de bordure des champs */
        }
        .form-control:focus {
            border-color: #007bff; /* Couleur de bordure lors du focus */
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25); /* Ombre de focus */
        }
        .btn-primary {
            background-color: #007bff; /* Couleur primaire du bouton */
            border-color: #007bff; /* Couleur de la bordure du bouton */
        }
    </style>
</head>
<body>

            <h2 class="text-center">Sélectionnez votre moyen de paiement pour {{ referral.referred.email }}</h2>
            <form action="{% url 'authentication:payment_selection' %}" method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="amount" class="form-label">Montant :</label>
                    <input type="number" id="amount" name="amount" value="5000" class="form-control" readonly>
                </div>

                <div class="form-group">
                    <label class="form-label">Pays :</label>
                    <p>{{ user.country }}</p> <!-- Affichage du pays de l'utilisateur -->
                    <input type="hidden" name="country" value="{{ user.country }}"> <!-- Hidden input pour soumettre le pays -->
                </div>
            </form>
            {% include 'authentication/payment.html' %}

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
{% endblock %}
