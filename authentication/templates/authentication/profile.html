<!-- profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profil Utilisateur</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 50%;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Profil</h1>
        <p>Balance: {{ wallet.balance }}</p>
        <p>Points: {{ wallet.points }}</p>
        <p>Level: {{ level.stage if level else 'No level' }}</p>
        <p>Referrals: {{ referrals }}</p>
    </div>
</body>
</html>
