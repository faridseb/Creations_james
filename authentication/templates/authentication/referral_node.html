<!-- referral_node.html -->
<div class="referral-node">
    <div class="user-info" style="border-color: {{ node.user.userprofile.avatar_color }}">
        <img src="{{ node.user.userprofile.avatar.url }}" alt="Avatar" class="avatar">
        <p>{{ node.user.userprofile.nom }} {{ node.user.userprofile.prenoms }}</p>
        <p>Contact: {{ node.user.userprofile.contact }}</p>
        <p>Date d'inscription: {{ node.user.date_joined }}</p>
    </div>
    {% if node.children %}
        <div class="children">
            {% for child in node.children %}
                {% include 'referral_node.html' with node=child %}
            {% endfor %}
        </div>
    {% endif %}
</div>
<style>
    .referral-node {
        border: 2px solid;
        padding: 10px;
        margin: 10px;
    }
    .avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
    }
    .children {
        margin-left: 20px;
    }
</style>
