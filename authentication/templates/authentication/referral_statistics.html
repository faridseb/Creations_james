<!-- templates/authentication/referral_statistics.html -->
{% extends 'use.html' %}

{% block content %}
<!DOCTYPE html>
<html lang="fr">
<head>

    <style>
        body {
            background-color: #f8f9fa;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 10px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;

        }
        .header {
            background-color: #343a40;
            color: white;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            background-color: #f0f0f0;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
        .stat-label {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 40px;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Statistiques de parrainage</h1>
        </div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Total des parrainages</div>
                <div class="stat-value">{{ total_referrals }}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Parrainage non Réussi</div>
                <div class="stat-value">{{ registered_users }}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Parrainages réussis</div>
                <div class="stat-value">{{ successful_referrals }}</div>
            </div>
        </div>
        <canvas id="myChart" width="400" height="200"></canvas>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Total des parrainages', 'Utilisateurs inscrits', 'Parrainages réussis'],
                datasets: [{
                    label: 'Statistiques de parrainage',
                    data: [{{ total_referrals }}, {{ registered_users }}, {{ successful_referrals }}],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    yAxes: [{
                        ticks: {
                            beginAtZero: true
                        }
                    }]
                }
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>

{% endblock %}
