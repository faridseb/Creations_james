<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une Catégorie - Admin</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajoutez un style pour masquer les messages après une seconde */
        .hide-after-1s {
            animation: hide-message 1s linear forwards;
        }

        @keyframes hide-message {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ajouter une Catégorie</h1>
        <!-- Afficher les messages flash ici -->
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} hide-after-1s">{{ message }}</div>
        {% endfor %}
        <!-- Afficher le formulaire de catégorie -->
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Ajouter</button>
        </form>
    </div>
    <script>
        // Masquer les messages flash après une seconde
        setTimeout(function() {
            $('.hide-after-1s').fadeOut(500);
        }, 1000);
    </script>
</body>
</html>
