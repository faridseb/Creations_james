<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Articles(Admin)</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .image-col {
            width: 100px;
            word-wrap: break-word;
        }
        .table img {
            max-width: 100px;
            height: auto;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .action-buttons a {
            flex: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="my-4">Liste des Produits a Commander</h1>
        <a href="{% url 'admin_add_article' %}" class="btn btn-success mb-4">Ajouter un Article</a>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Description</th>
                    <th>Prix</th>
                    <th class="image-col">Image</th>
                    <th>Catégorie</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                <tr>
                    <td>{{ article.title }}</td>
                    <td>{{ article.description }}</td>
                    <td>{{ article.price }}Frc</td>
                    <td>
                        <img src="{{ article.image_url }}" alt="{{ article.title }}">
                    </td>
                    <td>{{ article.category.name }}</td>
                    <td>
                        <div class="action-buttons">
                            <a href="{% url 'admin_edit_article' article.id %}" class="btn btn-primary btn-sm">Éditer</a>
                            <a href="{% url 'admin_delete_article' article.id %}" class="btn btn-danger btn-sm">Supprimer</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
