<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Supprimer un Article - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 3rem; font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { font-weight: bold; }
        .form-control { width: 100%; padding: 0.75rem; font-size: 1rem; line-height: 1.5; border: 1px solid #ced4da; border-radius: 0.25rem; }
        .btn-submit { font-size: 1.25rem; padding: 0.75rem 1.25rem; }
        .alert { padding: 0.75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: 0.25rem; }
        .alert-success { color: #155724; background-color: #d4edda; border-color: #c3e6cb; }
        .alert-error { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Supprimer un Article</h1>
        {% if messages %}
            <div id="messages">
                {% for message in messages %}
                    <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <form id="delete-article-form" method="post">
            {% csrf_token %}
            <p>Êtes-vous sûr de vouloir supprimer l'article "{{ article.name }}" ? Cette action est irréversible.</p>
            <button type="submit" class="btn btn-danger btn-submit">Supprimer</button>
            <a href="{% url 'admin_article_list' %}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</body>
</html>
