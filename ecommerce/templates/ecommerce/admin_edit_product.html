<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un Produit - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 3rem; font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { font-weight: bold; }
        .form-control { width: 100%; padding: 0.75rem; font-size: 1rem; line-height: 1.5; border: 1px solid #ced4da; border-radius: 0.25rem; }
        .btn-submit { font-size: 1.25rem; padding: 0.75rem 1.25rem; }
        .alert { padding: 0.75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: 0.25rem; }
        .alert-success { color: #155724; background-color: #d4edda; border-color: #c3e6cb; }
        .alert-error { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Modifier un Produit</h1>
        {% if messages %}
            <div id="messages">
                {% for message in messages %}
                    <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <form id="product-form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label for="name" class="form-label">Nom</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ form.name.value }}" required>
            </div>
            <div class="form-group">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" required>{{ form.description.value }}</textarea>
            </div>
            <div class="form-group">
                <label for="price" class="form-label">Prix</label>
                <input type="number" class="form-control" id="price" name="price" value="{{ form.price.value }}" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="category" class="form-label">Catégorie</label>
                <select class="form-control" id="category" name="category" required>
                    <option value="">Sélectionnez une catégorie</option>
                    {% for category in categories %}
                        <option value="{{ category.id }}" {% if category.id == form.category.value %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="image_url" class="form-label">URL de l'Image</label>
                <input type="url" class="form-control" id="image_url" name="image_url" value="{{ form.image_url.value }}" required>
            </div>
            <button type="submit" class="btn btn-success btn-submit">Modifier</button>
        </form>
    </div>
</body>
</html>
