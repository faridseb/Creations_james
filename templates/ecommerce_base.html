<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mon Site E-commerce{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'dist/css/adminlte.min.css' %}">
    <link rel="stylesheet" href="{% static 'dist/css/custom.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
    </nav>

    <!-- Main Sidebar Container -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="#" class="brand-link">
            <span class="brand-text font-weight-light">Mon E-commerce</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column">
                    <li class="nav-item">
                        <a href="{% url 'ecommerce:ecommerce_dashboard' %}" class="nav-link">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>Tableau de bord</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'ecommerce:profile' %}" class="nav-link">
                            <i class="nav-icon fas fa-user"></i>
                            <p>Profil</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'ecommerce:referrals' %}" class="nav-link">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Mes Parrainages</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'ecommerce:rewards' %}" class="nav-link">
                            <i class="nav-icon fas fa-star"></i>
                            <p>Récompenses</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'ecommerce:product_list' %}" class="nav-link">
                            <i class="nav-icon fas fa-star"></i>
                            <p>Deconnexion</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- Scripts -->
<script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
<script src="{% static 'plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'dist/js/adminlte.min.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
